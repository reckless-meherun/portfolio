# The primary author of this blog.
# Must be the same as `author` in `_config.yml`.
# Change `author1` to your shortname.
author1:
  name:              Meherun Farzana
  email:             meherun2001@gmail.com

  # Used at the bottom of each page and at the top of the `about` layout
  # Markdown enabled, can use multiple paragraphs (enabled by `|`)
  about:             |
    I am Meherun Farzana, a Computer Science and Engineering student at the University of Dhaka. My work focuses on AI research, natural language processing, educational technology, and Bangla handwritten text recognition. My recent interests include large language models, vision-language models, multimodal learning, and human-aligned evaluation systems for student responses. I am particularly interested in building practical AI systems that are both technically strong and useful in real educational settings. Currently, I am working on projects related to short-answer grading, Bangla handwriting recognition, and context-aware language and vision systems.
    
# Open `_data/authors.yml` to edit this text.

  # This photo will be used in the about section
  picture:
    path:            /assets/img/pfp.jpg
    # srcset is optional, but can be used to provide higher res versions for retina displays
    srcset:
      1x:            /assets/img/pfp.jpg
      2x:            /assets/img/pfp.jpg

