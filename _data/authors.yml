# The primary author of this blog.
# Must be the same as `author` in `_config.yml`.
# Change `author1` to your shortname.
author1:
  name:              Meherun Farzana
  email:             meherun2001@gmail.com

  # Used at the bottom of each page and at the top of the `about` layout
  # Markdown enabled, can use multiple paragraphs (enabled by `|`)
  about:             |
    Hi! I am Meherun Farzana, a senior undergraduate student in **Computer Science and Engineering** at [**University of Dhaka**](https://www.du.ac.bd/body/CSE). My work focuses on **natural language processing** and **AI in education**. Automatically evaluating the semantic and contextual depth of complex hand-drawn figures is what recently fascinates me the most. Currently I work as a **Research Assistant** at **Cognitive Agents and Interaction Lab** [**(CAIL)**](https://cognistorm.ai/) under the supervision of [**Dr. Md. Mosaddek Khan**](https://scholar.google.com/citations?user=IIb6f_4AAAAJ&hl=en). It is very recent that I am involved in translating natural business questions into correct SQLs efficiently, which is a crucial application for various press conferences. My recent interests include:
    - **Large Language Models**
    - **Computer Vision**
    - **Multimodal Reasoning**
    > <span class="highlight-opportunity">**I am expected to graduate by May 2026 and currently seeking research collaborations, internship and entry-level opportunities worldwide. I would highly appreciate it if you would reach me out regarding any suitable opportunities at [meherun2001@gmail.com](mailto:meherun2001@gmail.com)!**</span>
